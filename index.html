<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Evenementen i Agder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:2rem;
  font-family:system-ui,sans-serif;
  background:#f2f2f2;
}

h1{margin-bottom:1rem;}

input{
  width:100%;
  max-width:420px;
  padding:.6rem .8rem;
  border-radius:8px;
  border:1px solid #ccc;
  margin-bottom:2rem;
}

.month{margin-bottom:3rem;}
.month h2{margin-bottom:1rem;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:1.5rem;
}

.card{
  background:#fff;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 6px 16px rgba(0,0,0,.08);
  cursor:pointer;
}

.card img{
  width:100%;
  height:190px;
  object-fit:cover;
  background:#e0e0e0;
}

.content{padding:1.2rem;}

.date{
  font-size:.8rem;
  font-weight:600;
  color:#444;
}

.place{
  font-size:.75rem;
  color:#666;
}
</style>
</head>

<body>

<h1>Evenementen i Agder</h1>
<input id="search" placeholder="Zoek op titel, plaats of tekst…">
<div id="events">Evenementen laden…</div>

<script>
/* ===== config ===== */

const API =
 "https://www.markedsdager.no/wp-json/wp/v2/event" +
 "?eventcat=30&per_page=50&_jsonp=handleEvents";

const FALLBACK_IMAGE =
 "https://www.markedsdager.no/wp-content/uploads/2023/05/markedsdager_fallback.jpg";

const MONTHS={
  januar:0,februar:1,mars:2,april:3,mai:4,juni:5,
  juli:6,august:7,september:8,oktober:9,november:10,desember:11
};

let ALL_EVENTS = [];

/* ===== helpers ===== */

function strip(html){
  const d=document.createElement("div");
  d.innerHTML=html;
  return d.textContent.trim();
}

function extractDate(text){
  const m=text.toLowerCase().match(
    /(\d{1,2})(?:\.\s*(?:–|-)\s*(\d{1,2}))?\.\s*(januar|februar|mars|april|mai|juni|juli|august|september|oktober|november|desember)(?:\s*(\d{4}))?/
  );
  if(!m) return null;

  const day=parseInt(m[1],10);
  const month=MONTHS[m[3]];
  const year=m[4]?parseInt(m[4],10):new Date().getFullYear();

  let date=new Date(year,month,day);

  if(!m[4] && date < new Date()){
    date = new Date(year+1,month,day);
  }
  return date;
}

function extractPlace(classes=[]){
  const c=classes.find(x=>x.startsWith("location-"));
  return c ? c.replace("location-","").replace(/-/g," ") : "";
}

/* ===== ROBUUSTE IMAGE LOADER (fix lege kaarten) ===== */

function loadImage(id, img){
  // ✅ altijd eerst fallback
  img.src = FALLBACK_IMAGE;

  if(!id) return;

  const cb = "media_" + id;

  window[cb] = data => {
    if(data?.source_url){
      const test = new Image();
      test.onload = ()=> img.src = data.source_url;
      test.onerror = ()=> img.src = FALLBACK_IMAGE;
      test.src = data.source_url;
    }
    delete window[cb];
  };

  const s=document.createElement("script");
  s.src=
    "https://www.markedsdager.no/wp-json/wp/v2/media/" +
    id + "?_jsonp=" + cb;
  document.body.appendChild(s);
}

/* ===== RENDER ===== */

function render(filter=""){
  const container=document.getElementById("events");
  container.innerHTML="";
  const grouped={};

  ALL_EVENTS
    .filter(e=>e.search.includes(filter.toLowerCase()))
    .sort((a,b)=>a.date-b.date)
    .forEach(e=>{
      const key=e.date.getFullYear()+"-"+e.date.getMonth();
      (grouped[key] ||= []).push(e);
    });

  Object.keys(grouped).forEach(key=>{
    const d=grouped[key][0].date;
    const month=document.createElement("div");
    month.className="month";
    month.innerHTML=
      `<h2>${d.toLocaleDateString("nl-NL",{month:"long",year:"numeric"})}</h2>
       <div class="grid"></div>`;
    const grid=month.querySelector(".grid");

    grouped[key].forEach(e=>{
      const img=document.createElement("img");
      loadImage(e.media,img);

      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`
        <img>
        <div class="content">
          <div class="date">${e.date.toLocaleDateString("nl-NL")}</div>
          <h3>${e.title}</h3>
          <p>${e.excerpt}</p>
          <div class="place">${e.place}</div>
        </div>`;
      card.querySelector("img").replaceWith(img);
      card.onclick=()=>window.open(e.link,"_blank");
      grid.appendChild(card);
    });

    container.appendChild(month);
  });

  if(!container.innerHTML){
    container.textContent="Geen evenementen gevonden.";
  }
}

/* ===== DATA ===== */

function handleEvents(events){
  const today=new Date(); today.setHours(0,0,0,0);
  const oneYearLater=new Date(today);
  oneYearLater.setFullYear(today.getFullYear()+1);

  ALL_EVENTS = events
    .map(e=>{
      const text=strip(e.title.rendered+" "+e.excerpt.rendered+" "+e.content.rendered);
      const date=extractDate(text);
      if(!date) return null;
      if(date<today || date>oneYearLater) return null;

      return {
        title:strip(e.title.rendered),
        excerpt:strip(e.excerpt.rendered),
        link:e.link,
        date,
        place:extractPlace(e.class_list),
        media:e.featured_media,
        search:text.toLowerCase()
      };
    })
    .filter(Boolean);

  render();
}

document.getElementById("search").oninput =
  e=>render(e.target.value);

/* ===== JSONP start ===== */

const s=document.createElement("script");
s.src=API;
document.body.appendChild(s);
</script>

</body>
</html>
