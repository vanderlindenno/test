<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Arrangementer det kommende året</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: system-ui, sans-serif;
  background:#f5f5f5;
  padding:2rem;
  margin:0;
}
h1{margin-bottom:1rem;}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}
th,td{
  padding:.75rem .6rem;
  border-bottom:1px solid #ddd;
  text-align:left;
  vertical-align:top;
}
th{background:#f0f0f0;}

tbody tr:hover{
  background:#eef3ef;
  cursor:pointer;
}

.year{
  font-size:.8rem;
  color:#555;
}

/* Mobil */
@media(max-width:700px){
  body{padding:1rem;}
  table,thead,tbody,tr,td{display:block;}
  thead{display:none;}
  tbody tr{
    margin-bottom:1rem;
    padding:.75rem;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  td{border:none;padding:.3rem 0;}
  td::before{
    content:attr(data-label);
    display:block;
    font-size:.7rem;
    font-weight:600;
    text-transform:uppercase;
    color:#666;
  }
}
</style>
</head>

<body>

<h1>Arrangementer det kommende året</h1>

<table>
<thead>
<tr>
  <th>Dato</th>
  <th>Sted</th>
  <th>Arrangement</th>
</tr>
</thead>
<tbody id="arrangementer">
<tr><td colspan="3">Laster arrangementer…</td></tr>
</tbody>
</table>

<script>
/* =====================================================
   HULPFUNCTIES
   ===================================================== */
const MONTHS={
  januar:0,februar:1,mars:2,april:3,mai:4,juni:5,
  juli:6,august:7,september:8,oktober:9,november:10,desember:11
};

function strip(html){
  const d=document.createElement("div");
  d.innerHTML=html||"";
  return d.textContent.trim();
}

function today(){
  const d=new Date();
  d.setHours(0,0,0,0);
  return d;
}

function formatDato(d){
  const mnd=["januar","februar","mars","april","mai","juni",
             "juli","august","september","oktober","november","desember"];
  return `
    ${d.getDate()}. ${mnd[d.getMonth()]}
    <div class="year">${d.getFullYear()}</div>
  `;
}

/* =====================================================
   MARKEDSDAGER – OORSPRONKELIJKE WERKENDE LOGICA
   ===================================================== */
function visArrangementer(events){
  const tbody=document.getElementById("arrangementer");
  tbody.innerHTML="";

  events.forEach(e=>{
    const tekst = strip(
      (e.title?.rendered||"")+" "+
      (e.excerpt?.rendered||"")+" "+
      (e.content?.rendered||"")
    );

    // Probeer datum te vinden, maar blokkeer nooit
    let d = (() => {
      const m = tekst.match(
        /(\d{1,2})\.\s*(januar|februar|mars|april|mai|juni|juli|august|september|oktober|november|desember)(?:\s*(\d{4}))?/i
      );
      if(!m) return today();

      let year = m[3] ? parseInt(m[3],10) : new Date().getFullYear();
      let dt = new Date(year, MONTHS[m[2].toLowerCase()], parseInt(m[1],10));
      if(!m[3] && dt < today()) dt.setFullYear(year+1);
      dt.setHours(0,0,0,0);
      return dt;
    })();

    const tr=document.createElement("tr");
    tr.onclick=()=>window.open(e.link,"_blank");
    tr.innerHTML=`
      <td data-label="Dato">${formatDato(d)}</td>
      <td data-label="Sted">${
        (e.class_list||[])
          .find(c=>c.startsWith("location-"))
          ?.replace("location-","")
          .replace(/-/g," ")
          .replace(/\b\w/g,l=>l.toUpperCase())
        || "Agder"
      }</td>
      <td data-label="Arrangement">
        <strong>${strip(e.title?.rendered)}</strong><br>
        ${strip(e.excerpt?.rendered)}
      </td>
    `;
    tbody.appendChild(tr);
  });

  if(!tbody.innerHTML){
    tbody.innerHTML =
      "<tr><td colspan='3'>Ingen kommende arrangementer funnet.</td></tr>";
  }
}

/* =====================================================
   JSONP LADEN (zoals vóór RSS)
   ===================================================== */
(function(){
  const s=document.createElement("script");
  s.src=
    "https://www.markedsdager.no/wp-json/wp/v2/event" +
    "?per_page=50&_jsonp=visArrangementer";
  document.body.appendChild(s);
})();
</script>

</body>
</html>
``
