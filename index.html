<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Arrangementer – Brukt- og loppemarkeder i Agder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: system-ui, sans-serif;
  background:#f5f5f5;
  padding:2rem;
  margin:0;
}

h1{ margin-bottom:1rem; }

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th, td{
  padding:.75rem .6rem;
  border-bottom:1px solid #ddd;
  text-align:left;
  vertical-align:top;
}

th{ background:#f0f0f0; }

tbody tr:nth-child(even){ background:#f3f6f3; }

.year{ font-size:.8rem; color:#555; }

/* Mobil */
@media(max-width:700px){
  body{ padding:1rem; }
  table, thead, tbody, tr, td{ display:block; }
  thead{ display:none; }
  tbody tr{
    margin-bottom:1rem;
    padding:.75rem;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  td{ border:none; padding:.3rem 0; }
  td::before{
    content:attr(data-label);
    display:block;
    font-size:.7rem;
    font-weight:600;
    text-transform:uppercase;
    color:#666;
  }
}
</style>
</head>

<body>

<h1>Brukt- og loppemarkeder i Agder</h1>

<table>
<thead>
<tr>
  <th>Dato</th>
  <th>Sted</th>
  <th>Arrangement</th>
</tr>
</thead>
<tbody id="arrangementer">
  <tr><td colspan="3">Laster arrangementer…</td></tr>
</tbody>
</table>

<script>
/* ===============================
   FELLES DATA
   =============================== */

const MONTHS=["januar","februar","mars","april","mai","juni",
              "juli","august","september","oktober","november","desember"];

let alleEvents = [];
let ferdigKilder = 0;
const TOTALE_KILDER = 2;

/* ===============================
   HJELPERE
   =============================== */

function strip(html){
  const d=document.createElement("div");
  d.innerHTML=html||"";
  return d.textContent.trim();
}

function formatDato(start,end){
  if(start.getTime()===end.getTime()){
    return `${start.getDate()}. ${MONTHS[start.getMonth()]}
      <div class="year">${start.getFullYear()}</div>`;
  }
  return `${start.getDate()}.–${end.getDate()}. ${MONTHS[start.getMonth()]}
    <div class="year">${start.getFullYear()}</div>`;
}

function ferdig(){
  ferdigKilder++;
  if(ferdigKilder === TOTALE_KILDER){
    render();
  }
}

/* ===============================
   RENDER
   =============================== */

function render(){
  const tbody=document.getElementById("arrangementer");
  tbody.innerHTML="";

  const idag=new Date(); idag.setHours(0,0,0,0);
  const ettAar=new Date(idag); ettAar.setFullYear(idag.getFullYear()+1);

  const brukt=new Set();

  alleEvents
    .filter(e=>e.start>=idag && e.start<=ettAar)
    .sort((a,b)=>a.start-b.start)
    .filter(e=>{
      const key=e.start.toDateString()+"|"+e.sted.toLowerCase()+"|"+e.tittel.toLowerCase();
      if(brukt.has(key)) return false;
      brukt.add(key);
      return true;
    })
    .forEach(e=>{
      const tr=document.createElement("tr");
      tr.onclick=()=>window.open(e.link,"_blank");
      tr.innerHTML=`
        <td data-label="Dato">${formatDato(e.start,e.end)}</td>
        <td data-label="Sted">${e.sted}</td>
        <td data-label="Arrangement">
          <strong>${e.tittel}</strong><br>${e.tekst || ""}
        </td>`;
      tbody.appendChild(tr);
    });

  if(!tbody.innerHTML){
    tbody.innerHTML="<tr><td colspan='3'>Ingen kommende arrangementer funnet.</td></tr>";
  }
}

/* ===============================
   KILDE 1: MARKEDSDAGER (JSONP)
   =============================== */

function visArrangementer(events){
  events.forEach(e=>{
    const tekst = strip(
      (e.title?.rendered||"")+" "+
      (e.excerpt?.rendered||"")+" "+
      (e.content?.rendered||"")
    );

    const m = tekst.match(/(\d{1,2})\.\s*(januar|februar|mars|april|mai|juni|juli|august|september|oktober|november|desember)(?:\s*(\d{4}))?/i);
    if(!m) return;

    let y = m[3] ? parseInt(m[3],10) : new Date().getFullYear();
    let d = new Date(y, MONTHS.indexOf(m[2].toLowerCase()), parseInt(m[1],10));

    alleEvents.push({
      start:d,
      end:d,
      tittel: strip(e.title?.rendered),
      tekst: strip(e.excerpt?.rendered),
      sted:(e.class_list||[]).find(c=>c.startsWith("location-"))
        ?.replace("location-","").replace(/-/g," ")
        .replace(/\b\w/g,l=>l.toUpperCase()) || "Agder",
      link:e.link,
      kilde:"Markedsdager"
    });
  });
  ferdig();
}

(function(){
  const s=document.createElement("script");
  s.src="https://www.markedsdager.no/wp-json/wp/v2/event?eventcat=30&per_page=30&_jsonp=visArrangementer";
  document.body.appendChild(s);
})();

/* ===============================
   KILDE 2: VISIT SØRLANDET (RSS)
   =============================== */

(function(){
  const RSS =
    "https://api.rss2json.com/v1/api.json?rss_url=" +
    encodeURIComponent("https://en.visitsorlandet.com/event/rss/");

  fetch(RSS)
    .then(r=>r.json())
    .then(data=>{
      (data.items||[])
        .filter(i=>/brukt|lopp|marked|bytt/i.test(
          (i.title||"")+" "+(i.description||"")
        ))
        .forEach(i=>{
          const d=new Date(i.pubDate);
          d.setHours(0,0,0,0);
          alleEvents.push({
            start:d,
            end:d,
            tittel:i.title,
            tekst:strip(i.description),
            sted:"Agder",
            link:i.link,
            kilde:"Visit Sørlandet"
          });
        });
    })
    .finally(ferdig);
})();
</script>

</body>
</html>
