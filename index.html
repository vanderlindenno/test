<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Arrangementer det kommende året</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: system-ui, sans-serif;
  background:#f5f5f5;
  padding:2rem;
}
h1{
  margin-bottom:1rem;
}
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}
th, td{
  padding:.6rem;
  border-bottom:1px solid #ddd;
  text-align:left;
  vertical-align:top;
}
th{
  background:#f0f0f0;
}
tr.clickable{
  cursor:pointer;
}
tr.clickable:hover{
  background:#f7f7f7;
}
</style>
</head>

<body>

<h1>Arrangementer det kommende året</h1>

<table>
  <thead>
    <tr>
      <th>Dato</th>
      <th>Sted</th>
      <th>Arrangement</th>
    </tr>
  </thead>
  <tbody id="arrangementer">
    <tr>
      <td colspan="3">Laster arrangementer…</td>
    </tr>
  </tbody>
</table>

<script>
const API =
  "https://www.markedsdager.no/wp-json/wp/v2/event" +
  "?eventcat=30&per_page=50&_jsonp=visArrangementer";

const MONTHS = {
  januar:0,februar:1,mars:2,april:3,mai:4,juni:5,
  juli:6,august:7,september:8,oktober:9,november:10,desember:11
};

function strip(html){
  const d=document.createElement("div");
  d.innerHTML=html;
  return d.textContent.trim();
}

function finnDato(text){
  const m=text.toLowerCase().match(
    /(\d{1,2})\.\s*(januar|februar|mars|april|mai|juni|juli|august|september|oktober|november|desember)(?:\s*(\d{4}))?/
  );
  if(!m) return null;

  const dag=parseInt(m[1],10);
  const mnd=MONTHS[m[2]];
  const aar=m[3]?parseInt(m[3],10):new Date().getFullYear();

  let dato=new Date(aar,mnd,dag);
  if(!m[3] && dato < new Date()){
    dato=new Date(aar+1,mnd,dag);
  }
  return dato;
}

function finnSted(classes=[]){
  const c=classes.find(x=>x.startsWith("location-"));
  return c ? c.replace("location-","").replace(/-/g," ") : "";
}

function visArrangementer(events){
  const tbody=document.getElementById("arrangementer");
  tbody.innerHTML="";

  const idag=new Date(); idag.setHours(0,0,0,0);
  const ettAarFrem=new Date(idag);
  ettAarFrem.setFullYear(idag.getFullYear()+1);

  const liste = events
    .map(e=>{
      const tekst = strip(
        e.title.rendered + " " +
        e.excerpt.rendered + " " +
        e.content.rendered
      );
      const dato = finnDato(tekst);
      if(!dato) return null;
      if(dato < idag || dato > ettAarFrem) return null;

      return {
        dato,
        sted: finnSted(e.class_list),
        tittel: strip(e.title.rendered),
        beskrivelse: strip(e.excerpt.rendered),
        link: e.link
      };
    })
    .filter(Boolean)
    .sort((a,b)=>a.dato-b.dato);

  if(!liste.length){
    tbody.innerHTML =
      "<tr><td colspan='3'>Ingen kommende arrangementer funnet.</td></tr>";
    return;
  }

  liste.forEach(a=>{
    const tr=document.createElement("tr");
    tr.className="clickable";
    tr.onclick=()=>window.open(a.link,"_blank");

    tr.innerHTML=`
      <td>${a.dato.toLocaleDateString("nb-NO")}</td>
      <td>${a.sted}</td>
      <td>
        <strong>${a.tittel}</strong><br>
        ${a.beskrivelse}
      </td>
    `;

    tbody.appendChild(tr);
  });
}

const s=document.createElement("script");
s.src=API;
document.body.appendChild(s);
</script>

</body>
</html>
``
