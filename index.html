<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Events</title>
</head>
<body>
<h2>Event toevoegen</h2>

<form
  action="https://vanderlinden.42web.io/api/add_event.php"
  method="POST"
  enctype="multipart/form-data"
>

  <input
    type="text"
    name="title"
    placeholder="Titel"
    required
  >

  <input
    type="date"
    name="date"
    required
  >

  <input
    type="text"
    name="location"
    placeholder="Plaats"
    required
  >

  <textarea
    name="description"
    placeholder="Beschrijving"
  ></textarea>

  <input
    type="file"
    name="photo"
  >

  <input
    type="text"
    name="contact"
    placeholder="Contactpersoon"
  >

  <button type="submit">Opslaan</button>
</form>

<h2>Events</h2>
<div id="events"></div>
<script src="app.js"></script>
</body>
</html>
