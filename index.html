<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Arrangementer det kommende året</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: system-ui, sans-serif;
  background:#f5f5f5;
  padding:2rem;
  margin:0;
}

h1{margin-bottom:1rem;}

table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
}

th,td{
  padding:.75rem .6rem;
  border-bottom:1px solid #ddd;
  text-align:left;
  vertical-align:top;
}

th{background:#f0f0f0;}

tbody tr:nth-child(even){background:#f3f6f3;}
tbody tr:nth-child(odd){background:#fff;}

tr.clickable{cursor:pointer;}
tr.clickable:hover{background:#e8eee8;}

tr.kommende-helg{
  background:#dfeee2 !important;
  border-left:6px solid #4d7c57;
}

.year{
  font-size:.8rem;
  color:#555;
}

/* MOBIL */
@media(max-width:700px){
  body{padding:1rem;}
  table,thead,tbody,tr,td{display:block;}
  thead{display:none;}

  tbody tr{
    margin-bottom:1rem;
    padding:.75rem;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }

  td{
    border:none;
    padding:.3rem 0;
  }

  td::before{
    content:attr(data-label);
    display:block;
    font-size:.7rem;
    font-weight:600;
    text-transform:uppercase;
    color:#666;
    margin-bottom:.1rem;
  }
}
</style>
</head>

<body>

<h1>Arrangementer det kommende året</h1>

<table>
  <thead>
    <tr>
      <th>Dato</th>
      <th>Sted</th>
      <th>Arrangement</th>
    </tr>
  </thead>
  <tbody id="arrangementer">
    <tr><td colspan="3">Laster arrangementer…</td></tr>
  </tbody>
</table>

<script>
/* ========= KONFIG ========= */
const API =
  "https://www.markedsdager.no/wp-json/wp/v2/event" +
  "?eventcat=30&per_page=50&_jsonp=visArrangementer";

/* ========= HELPERS ========= */
function strip(html){
  const d=document.createElement("div");
  d.innerHTML=html || "";
  return d.textContent.trim();
}

function parseDate(v){
  if(!v) return null;
  const d=new Date(v);
  return isNaN(d) ? null : d;
}

/* Hent sikre start-/sluttdatoer */
function hentPeriode(e){
  const acf=e.acf || {};
  const start=
    parseDate(acf.start_date) ||
    parseDate(e.event_start) ||
    parseDate(e.start_date);

  const end=
    parseDate(acf.end_date) ||
    parseDate(e.event_end) ||
    parseDate(e.end_date) ||
    start;

  return start ? {start,end} : null;
}

function kommendeHelg(d){
  const i=new Date(); i.setHours(0,0,0,0);
  const fredag=new Date(i);
  fredag.setDate(i.getDate()+((5-i.getDay()+7)%7));
  const søndag=new Date(fredag);
  søndag.setDate(fredag.getDate()+2);
  return d>=fredag && d<=søndag;
}

function formatDatoRange(start,end){
  const dager=["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];
  const mnd=["januar","februar","mars","april","mai","juni",
             "juli","august","september","oktober","november","desember"];

  if(start.getTime()===end.getTime()){
    return `
      ${dager[start.getDay()]} ${start.getDate()}. ${mnd[start.getMonth()]}
      <div class="year">${start.getFullYear()}</div>
    `;
  }

  if(start.getMonth()===end.getMonth()){
    return `
      ${start.getDate()}.–${end.getDate()}. ${mnd[start.getMonth()]}
      <div class="year">${start.getFullYear()}</div>
    `;
  }

  return `
    ${start.getDate()}. ${mnd[start.getMonth()]} –
    ${end.getDate()}. ${mnd[end.getMonth()]}
    <div class="year">${start.getFullYear()}</div>
  `;
}

/* ========= CALLBACK ========= */
function visArrangementer(events){
  const tbody=document.getElementById("arrangementer");
  tbody.innerHTML="";

  const idag=new Date(); idag.setHours(0,0,0,0);
  const ettAar=new Date(idag); ettAar.setFullYear(idag.getFullYear()+1);

  const brukt=new Set();

  events
    .map(e=>{
      const periode=hentPeriode(e);
      if(!periode) return null;

      const {start,end}=periode;
      if(end<idag || start>ettAar) return null;

      const tittel=strip(e.title?.rendered);
      const tekst=strip(e.excerpt?.rendered);
      const link=e.link;

      const sted=(e.class_list||[])
        .find(c=>c.startsWith("location-"))
        ?.replace("location-","")
        .replace(/-/g," ")
        .replace(/\b\w/g,l=>l.toUpperCase()) || "";

      const key=`${start}|${end}|${tittel}|${sted}`;
      if(brukt.has(key)) return null;
      brukt.add(key);

      return {start,end,tittel,tekst,sted,link};
    })
    .filter(Boolean)
    .sort((a,b)=>a.start-b.start)
    .forEach(a=>{
      const tr=document.createElement("tr");
      tr.className="clickable";

      if(a.start.getTime()===a.end.getTime() && kommendeHelg(a.start))
        tr.classList.add("kommende-helg");

      tr.onclick=()=>window.open(a.link,"_blank");

      tr.innerHTML=`
        <td data-label="Dato">${formatDatoRange(a.start,a.end)}</td>
        <td data-label="Sted">${a.sted}</td>
        <td data-label="Arrangement">
          <strong>${a.tittel}</strong><br>${a.tekst}
        </td>
      `;
      tbody.appendChild(tr);
    });

  if(!tbody.innerHTML){
    tbody.innerHTML=
      "<tr><td colspan='3'>Ingen kommende arrangementer funnet.</td></tr>";
  }
}

/* ========= JSONP ========= */
const s=document.createElement("script");
s.src=API;
document.body.appendChild(s);
</script>

</body>
</html>
