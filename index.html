<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Evenementen i Agder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 2rem;
  font-family: system-ui, sans-serif;
  background: #f2f2f2;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 1.2rem;
  box-shadow: 0 6px 16px rgba(0,0,0,.08);
  cursor: pointer;
}
</style>
</head>

<body>

<h1>Evenementen i Agder</h1>
<div id="events">Evenementen laden…</div>

<script>
function strip(html) {
  const d = document.createElement("div");
  d.innerHTML = html;
  return d.textContent.trim();
}

// JSONP callback
function showEvents(events) {
  const container = document.getElementById("events");
  container.innerHTML = "";

  if (!events || !events.length) {
    container.textContent = "Geen evenementen gevonden.";
    return;
  }

  const grid = document.createElement("div");
  grid.className = "grid";

  events.forEach(e => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <h3>${strip(e.title.rendered)}</h3>
      <p>${strip(e.excerpt.rendered)}</p>
    `;
    card.onclick = () => window.open(e.link, "_blank");
    grid.appendChild(card);
  });

  container.appendChild(grid);
}

// JSONP script injectie
const script = document.createElement("script");
script.src =
  "https://www.markedsdager.no/wp-json/wp/v2/event" +
  "?eventcat=30&per_page=20&_jsonp=showEvents";
document.body.appendChild(script);
</script>

</body>
</html>
