<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<title>Brukt- og loppemarkeder i Agder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  font-family: system-ui, sans-serif;
  background:#f5f5f5;
  padding:2rem;
  margin:0;
}
h1{margin-bottom:1rem;}

table{
  width:100%;
  border-collapse:collapse;
  background:#ffffff;
}
th,td{
  padding:.75rem .6rem;
  border-bottom:1px solid #ddd;
  text-align:left;
  vertical-align:top;
}
th{background:#f0f0f0;}
tbody tr:hover{background:#eef3ef; cursor:pointer;}
.year{font-size:.8rem;color:#555;}

@media(max-width:700px){
  body{padding:1rem;}
  table,thead,tbody,tr,td{display:block;}
  thead{display:none;}
  tbody tr{
    margin-bottom:1rem;
    padding:.75rem;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.06);
  }
  td{border:none;padding:.3rem 0;}
  td::before{
    content:attr(data-label);
    font-size:.7rem;
    font-weight:600;
    text-transform:uppercase;
    color:#666;
    display:block;
  }
}
</style>
</head>

<body>

<h1>Brukt‑ og loppemarkeder i Agder</h1>

<table>
<thead>
<tr>
  <th>Dato</th>
  <th>Sted</th>
  <th>Arrangement</th>
</tr>
</thead>
<tbody id="arrangementer">
<tr><td colspan="3">Laster arrangementer…</td></tr>
</tbody>
</table>

<script>
/* =====================================================
   FELLES
   ===================================================== */
const MONTHS=[
  "januar","februar","mars","april","mai","juni",
  "juli","august","september","oktober","november","desember"
];

const tbody=document.getElementById("arrangementer");
const seen=new Set();

function strip(html){
  const d=document.createElement("div");
  d.innerHTML=html||"";
  return d.textContent.trim();
}

function today(){
  const d=new Date();
  d.setHours(0,0,0,0);
  return d;
}

function formatDato(d){
  return `${d.getDate()}. ${MONTHS[d.getMonth()]}
    <div class="year">${d.getFullYear()}</div>`;
}

function renderEvent(e){
  const key =
    e.start.toDateString()+"|"+
    e.sted.toLowerCase()+"|"+
    e.tittel.toLowerCase();

  if(seen.has(key)) return;
  seen.add(key);

  const tr=document.createElement("tr");
  tr.onclick=()=>window.open(e.link,"_blank");
  tr.innerHTML=`
    <td data-label="Dato">${formatDato(e.start)}</td>
    <td data-label="Sted">${e.sted}</td>
    <td data-label="Arrangement">
      <strong>${e.tittel}</strong><br>${e.tekst||""}
    </td>`;
  tbody.appendChild(tr);
}

/* =====================================================
   MARKEDSDAGER (PRIMAIR, TOLERANT)
   ===================================================== */
function visArrangementer(events){
  if(!Array.isArray(events) || events.length===0) return;

  tbody.innerHTML="";

  events.forEach(e=>{
    const tekst = strip(
      (e.title?.rendered||"")+" "+
      (e.excerpt?.rendered||"")+" "+
      (e.content?.rendered||"")
    );

    // Probeer datum te vinden – MAAR faal nooit hard
    let d = (() => {
      const m = tekst.match(
        /(\d{1,2})\.\s*(januar|februar|mars|april|mai|juni|juli|august|september|oktober|november|desember)(?:\s*(\d{4}))?/i
      );
      if(!m) return today();

      let y = m[3]?parseInt(m[3],10):new Date().getFullYear();
      let dt = new Date(y, MONTHS.indexOf(m[2].toLowerCase()), parseInt(m[1],10));
      if(!m[3] && dt < today()) dt.setFullYear(y+1);
      dt.setHours(0,0,0,0);
      return dt;
    })();

    renderEvent({
      start:d,
      tittel:strip(e.title?.rendered),
      tekst:strip(e.excerpt?.rendered),
      sted:(e.class_list||[])
        .find(c=>c.startsWith("location-"))
        ?.replace("location-","")
        .replace(/-/g," ")
        .replace(/\b\w/g,l=>l.toUpperCase()) || "Agder",
      link:e.link,
      kilde:"Markedsdager"
    });
  });

  if(!tbody.innerHTML){
    tbody.innerHTML="<tr><td colspan='3'>Ingen kommende arrangementer funnet.</td></tr>";
  }
}

// JSONP – ALLE events (geen eventcat)
(function(){
  const s=document.createElement("script");
  s.src=
    "https://www.markedsdager.no/wp-json/wp/v2/event" +
    "?per_page=50&_jsonp=visArrangementer";
  document.body.appendChild(s);
})();

/* =====================================================
   VISIT SØRLANDET RSS (SECUNDAIR, KAN NIETS BREKEN)
   ===================================================== */
(function(){
  const RSS =
    "https://api.rss2json.com/v1/api.json?rss_url=" +
    encodeURIComponent("https://en.visitsorlandet.com/event/rss/");

  fetch(RSS)
    .then(r=>r.json())
    .then(data=>{
      (data.items||[]).forEach(i=>{
        if(!/brukt|lopp|marked|bytt|gjenbruk|second|brocante/i.test(
          (i.title||"")+" "+(i.description||"")
        )) return;

        const d=new Date(i.pubDate);
        if(isNaN(d)) return;
        d.setHours(0,0,0,0);

        renderEvent({
          start:d,
          tittel:i.title,
          tekst:strip(i.description),
          sted:"Agder",
          link:i.link,
          kilde:"Visit Sørlandet"
        });
      });
    })
    .catch(()=>{/* stil falen */});
})();
</script>

</body>
</html>
