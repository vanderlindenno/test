<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Evenementen i Agder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 2rem;
  font-family: system-ui, sans-serif;
  background: #f2f2f2;
}

h1 {
  margin-bottom: 2rem;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
}

.card {
  background: white;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  background: #ddd;
}

.content {
  padding: 1.2rem;
}

.content h3 {
  margin-top: 0;
}

.label {
  display: inline-block;
  margin-top: .6rem;
  padding: .3rem .7rem;
  font-size: .75rem;
  border-radius: 999px;
  background: #f0f0f0;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<h1>Evenementen i Agder</h1>
<div id="events">Evenementen laden…</div>

<script>
const API =
  "https://www.markedsdager.no/wp-json/wp/v2/event?eventcat=30&per_page=20";

function strip(html) {
  const d = document.createElement("div");
  d.innerHTML = html;
  return d.textContent.trim();
}

async function getImage(mediaId) {
  if (!mediaId) return null;
  const r = await fetch(
    "https://www.markedsdager.no/wp-json/wp/v2/media/" + mediaId
  );
  const m = await r.json();
  return m.source_url || null;
}

fetch(API)
.then(r => r.json())
.then(async events => {
  const container = document.getElementById("events");
  container.innerHTML = "";

  if (!events.length) {
    container.textContent = "Geen evenementen gevonden.";
    return;
  }

  const grid = document.createElement("div");
  grid.className = "grid";

  for (const event of events) {
    const img = await getImage(event.featured_media);

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      ${img ? `<img src="${img}"   <div class="content">
        <h3>${strip(event.title.rendered)}</h3>
        <p>${strip(event.excerpt.rendered)}</p>
        <span class="label">Agder</span>
      </div>
    `;

    card.onclick = () => window.open(event.link, "_blank");
    grid.appendChild(card);
  }

  container.appendChild(grid);
})
.catch(err => {
  document.getElementById("events").textContent =
    "Fout bij laden van evenementen.";
  console.error(err);
});
</script>

</body>
</html>
