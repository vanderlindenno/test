<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Evenementen i Agder</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  margin: 2rem;
  font-family: system-ui, sans-serif;
  background: #f2f2f2;
}
h1 { margin-bottom: 2rem; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
}

.card {
  background: #fff;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.content {
  padding: 1.2rem;
}

.labels {
  display: flex;
  gap: .5rem;
  flex-wrap: wrap;
  margin-top: 1rem;
}

.label {
  font-size: .75rem;
  padding: .35rem .8rem;
  border-radius: 999px;
  border: 1px solid #ccc;
  background: #f7f7f7;
}
</style>
</head>

<body>

<h1>Evenementen i Agder</h1>
<div id="events">Evenementen laden…</div>

<script>
const API =
  "https://www.markedsdager.no/wp-json/wp/v2/event?_embed&eventcat=agder&per_page=50";

function strip(html) {
  const d = document.createElement("div");
  d.innerHTML = html;
  return d.textContent.trim();
}

fetch(API)
.then(r => r.json())
.then(events => {
  const container = document.getElementById("events");
  container.innerHTML = "";

  if (!events.length) {
    container.textContent = "Geen evenementen gevonden.";
    return;
  }

  const grid = document.createElement("div");
  grid.className = "grid";

  events.forEach(event => {
    const image =
      event._embedded?.["wp:featuredmedia"]?.[0]?.source_url ||
      "https://via.placeholder.com/600x400?text=Evenement";

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      ${image}
      <div class="content">
        <h3>${strip(event.title.rendered)}</h3>
        <p>${strip(event.excerpt.rendered)}</p>
        <div class="labels">
          <span class="label">Markedsdager</span>
          <span class="label">Agder</span>
        </div>
      </div>
    `;

    card.onclick = () => window.open(event.link, "_blank");
    grid.appendChild(card);
  });

  container.appendChild(grid);
})
.catch(() => {
  document.getElementById("events").textContent =
    "Fout bij laden van evenementen.";
});
</script>

</body>
</html>
